<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endurance Quick Reference</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e8e8e8; line-height: 1.5; }
  header { position: sticky; top: 0; background: #0a0a0a; border-bottom: 1px solid #222; padding: 10px 14px; z-index: 100; }
  h1 { font-size: 17px; margin: 0 0 8px 0; color: #fff; font-weight: 600; }
  .search-row { display: flex; gap: 6px; }
  #search { flex: 1; padding: 11px 13px; font-size: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
  #search:focus { border-color: #4a90e2; }
  #clear-btn { padding: 0 13px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #888; font-size: 14px; cursor: pointer; }

  .mega-filter { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .mega-pill { flex: 1; min-width: 60px; padding: 9px 6px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #aaa; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 0.4px; }
  .mega-pill[data-mega="all"].active { background: #888; border-color: #888; color: #0a0a0a; }
  .mega-pill[data-mega="run"].active { background: #5fd068; border-color: #5fd068; color: #0a0a0a; }
  .mega-pill[data-mega="bike"].active { background: #4a90e2; border-color: #4a90e2; color: #fff; }
  .mega-pill[data-mega="swim"].active { background: #4ad9d9; border-color: #4ad9d9; color: #0a0a0a; }
  .mega-pill[data-mega="water"].active { background: #5fc5e8; border-color: #5fc5e8; color: #0a0a0a; }
  .mega-pill[data-mega="winter"].active { background: #d0e8ff; border-color: #d0e8ff; color: #0a0a0a; }
  .mega-pill[data-mega="row"].active { background: #ffd24a; border-color: #ffd24a; color: #0a0a0a; }
  .mega-pill[data-mega="machine"].active { background: #ff5b8e; border-color: #ff5b8e; color: #fff; }
  .mega-pill[data-mega="outdoor"].active { background: #aa6fff; border-color: #aa6fff; color: #fff; }
  .mega-pill[data-mega="multi"].active { background: #e2944a; border-color: #e2944a; color: #0a0a0a; }
  .mega-pill[data-mega="training"].active { background: #87cefa; border-color: #87cefa; color: #0a0a0a; }
  .mega-pill[data-mega="race"].active { background: #e25555; border-color: #e25555; color: #fff; }

  .sub-filter { display: flex; gap: 5px; margin-top: 7px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
  .sub-pill { padding: 6px 11px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #888; font-size: 11.5px; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .sub-pill.active { background: #4a90e2; border-color: #4a90e2; color: #fff; }

  main { padding: 12px 14px 60px; }
  #results-count { font-size: 11px; color: #666; margin-bottom: 10px; letter-spacing: 0.3px; }

  /* Exercise card */
  .exercise { background: #141414; border: 1px solid #222; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
  .exercise-header { padding: 14px; display: flex; align-items: center; gap: 11px; cursor: pointer; user-select: none; }
  .exercise-header:active { background: #1a1a1a; }
  .ex-icon { width: 38px; height: 38px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ex-icon svg { width: 24px; height: 24px; color: #888; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-title { font-size: 15px; font-weight: 600; color: #fff; }
  .ex-tag { font-size: 11px; color: #888; margin-top: 1px; }
  .mega-badge { font-size: 9.5px; padding: 3px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
  .mega-badge.run { background: #1a2818; color: #5fd068; }
  .mega-badge.bike { background: #182838; color: #4a90e2; }
  .mega-badge.swim { background: #183838; color: #4ad9d9; }
  .mega-badge.water { background: #182b38; color: #5fc5e8; }
  .mega-badge.winter { background: #2a3848; color: #d0e8ff; }
  .mega-badge.row { background: #38301a; color: #ffd24a; }
  .mega-badge.machine { background: #382030; color: #ff5b8e; }
  .mega-badge.outdoor { background: #2a1a3a; color: #aa6fff; }
  .mega-badge.multi { background: #38281a; color: #e2944a; }
  .mega-badge.training { background: #1a2a3a; color: #87cefa; }
  .mega-badge.race { background: #3a1a1a; color: #e25555; }

  .importance { display: inline-flex; align-items: center; gap: 3px; font-size: 9.5px; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
  .importance.t5 { background: #4a1818; color: #ff8080; }
  .importance.t4 { background: #3a2418; color: #ffb060; }
  .importance.t3 { background: #2a2a18; color: #e0d060; }
  .importance.t2 { background: #182a2a; color: #80c0c0; }
  .importance.t1 { background: #1a1a2a; color: #8888a0; }
  .importance-stars { font-size: 11px; letter-spacing: 1px; color: inherit; }

  .chevron { color: #666; font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .exercise.open > .exercise-header .chevron { transform: rotate(90deg); }
  .exercise-body { display: none; padding: 0 14px 14px 14px; border-top: 1px solid #222; }
  .exercise.open > .exercise-body { display: block; }

  .section { margin-top: 12px; }
  .section-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.7px; color: #4a90e2; margin-bottom: 5px; font-weight: 700; }
  .section-title.warn { color: #e2944a; }
  .section-title.tip { color: #5fd068; }
  .section-title.danger { color: #e25555; }
  .section-title.var { color: #c98aff; }
  .section-content { font-size: 13.5px; color: #d0d0d0; }
  .section-content ul { margin: 0; padding-left: 16px; }
  .section-content li { margin-bottom: 3px; }
  .section-content strong { color: #fff; }

  .programming-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; font-size: 12.5px; }
  .programming-grid div:nth-child(odd) { color: #888; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.5px; align-self: center; }

  .quick-cue { background: #1a1a1a; border-left: 3px solid #4a90e2; padding: 9px 11px; border-radius: 5px; margin-top: 8px; font-size: 13px; font-style: italic; color: #b8b8b8; }
  .exercise[data-mega="run"] .quick-cue { border-left-color: #5fd068; }
  .exercise[data-mega="bike"] .quick-cue { border-left-color: #4a90e2; }
  .exercise[data-mega="swim"] .quick-cue { border-left-color: #4ad9d9; }
  .exercise[data-mega="water"] .quick-cue { border-left-color: #5fc5e8; }
  .exercise[data-mega="winter"] .quick-cue { border-left-color: #d0e8ff; }
  .exercise[data-mega="row"] .quick-cue { border-left-color: #ffd24a; }
  .exercise[data-mega="machine"] .quick-cue { border-left-color: #ff5b8e; }
  .exercise[data-mega="outdoor"] .quick-cue { border-left-color: #aa6fff; }
  .exercise[data-mega="multi"] .quick-cue { border-left-color: #e2944a; }
  .exercise[data-mega="training"] .quick-cue { border-left-color: #87cefa; }
  .exercise[data-mega="race"] .quick-cue { border-left-color: #e25555; }

  /* Variations nested cards */
  .variations-wrap { margin-top: 8px; }
  .variation { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
  .variation-header { padding: 9px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; gap: 8px; flex-wrap: wrap; }
  .variation-header:active { background: #222; }
  .var-title { font-size: 13.5px; font-weight: 600; color: #e8d4ff; flex: 1; min-width: 50%; }
  .var-best { font-size: 9.5px; background: #3a2a4d; color: #d4b3ff; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700; flex-shrink: 0; }
  .var-chev { color: #777; font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
  .variation.open .var-chev { transform: rotate(90deg); }
  .variation-body { display: none; padding: 0 12px 11px 12px; border-top: 1px solid #2a2a2a; }
  .variation.open .variation-body { display: block; }
  .var-cue { background: #14101a; border-left: 2px solid #c98aff; padding: 7px 10px; border-radius: 4px; margin-top: 8px; font-size: 12.5px; font-style: italic; color: #c8b8d8; }
  .var-section { margin-top: 9px; }
  .var-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #c98aff; margin-bottom: 4px; font-weight: 700; }
  .var-section-title.warn { color: #e2944a; }
  .var-section-title.tip { color: #5fd068; }
  .var-section-content { font-size: 12.5px; color: #c8c8c8; }
  .var-section-content ul { margin: 0; padding-left: 15px; }
  .var-section-content li { margin-bottom: 2px; }

  .no-results { text-align: center; color: #666; padding: 40px 20px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>🏃 Endurance Quick Reference <span id="ts" style="font-size: 11px; color: #555; font-weight: 400; letter-spacing: 0.3px; margin-left: 6px;"></span></h1>
  <div class="search-row">
    <input type="text" id="search" placeholder="Search modes, cues, distances..." autocomplete="off">
    <button id="clear-btn">✕</button>
  </div>
  <div class="mega-filter" id="mega-filter">
    <div class="mega-pill active" data-mega="all">All</div>
    <div class="mega-pill" data-mega="run">Run</div>
    <div class="mega-pill" data-mega="bike">Bike</div>
    <div class="mega-pill" data-mega="swim">Swim</div>
    <div class="mega-pill" data-mega="water">Water</div>
    <div class="mega-pill" data-mega="winter">Winter</div>
    <div class="mega-pill" data-mega="row">Row</div>
    <div class="mega-pill" data-mega="machine">Machine</div>
    <div class="mega-pill" data-mega="outdoor">Outdoor</div>
    <div class="mega-pill" data-mega="multi">Multi-Sport</div>
    <div class="mega-pill" data-mega="training">Training</div>
    <div class="mega-pill" data-mega="race">Race Day</div>
  </div>
  <div class="sub-filter" id="sub-filter"></div>
</header>

<main>
  <div id="results-count"></div>
  <div id="exercises"></div>
</main>

<script>
const exercises = [

  /* ==================== RUNNING ==================== */
  {
    id:'running-form', title:'Running Form', tag:'Run • Mechanics',
    mega:'run', sub:'form', keywords:'running form cadence posture stride foot strike arms',
    quickCue:'Tall posture, lean from ankles, foot under hip, 175+ cadence.',
    general:{
      setup:['Crown of head pulled to sky','Shoulders down and relaxed','Slight forward lean from the ankles (not waist)','Eyes 15-20 ft ahead'],
      movement:['Foot lands under your hip, not in front','Quick, light steps (175+ spm cadence)','Drive elbows back, hands relaxed','Hip extension on toe-off — glutes fire'],
      mistakes:['Heel striking with overstride (foot lands in front of hip)','Bending at waist instead of ankles','Slow cadence (sub-170)','Cross-body arm swing','Tensed shoulders/face','Slouching when tired']
    },
    variations: [
      { id:'form-cadence', title:'Cadence (175-180 spm)', best:'Form Anchor',
        cue:'Count right-foot strikes for 15 sec. 22 = 176 spm. Use metronome or BPM music.',
        setup:['Metronome app at 170-175','Or 175 BPM playlist (Spotify, jog.fm)'],
        movement:['Smaller steps at same pace — NOT faster legs','Quick & light, like running on hot coals','Builds at easy pace first, transfers to all paces'],
        mistakes:['Speeding up instead of shortening stride','Jumping straight to 180 from 160','Forcing cadence during hard workouts before easy pace is dialed'],
        programming:{'Build':'+5 spm per week','Tools':'Metronome app, BPM playlist','Timeline':'4-6 weeks to feel natural'},
        tip:'Cadence is the keystone — fixes overstriding, vertical bounce, ground contact time all at once.' },
      { id:'form-lean', title:'Forward Lean (5°)', best:'Posture Base',
        cue:'Lean from the ankles as one rigid column. Body angle ~5° forward.',
        setup:['Stand tall, weight ahead of feet','Imagine string pulling crown of head up'],
        movement:['Whole body tips forward as a unit','Hips stack under shoulders','Spine stays neutral'],
        mistakes:['Bending at the waist (kills hip extension)','Banana shape — hips forward, shoulders back','Looking down at feet (head drops, posture collapses)'],
        programming:{'Drill':'Wall lean, fall-and-catch'},
        tip:'Feels more aggressive than it looks. ~5° is plenty. Hold posture with core, not effort.' },
      { id:'form-arms', title:'Arm Swing', best:'Cadence Driver',
        cue:'Drive elbows BACKWARD, not punching forward. Pockets to ribs.',
        setup:['90° elbow bend','Hands relaxed — potato chip grip','Shoulders down, no creep up to ears'],
        movement:['Hands travel from hip pocket to lower ribs','Forearms parallel to direction of travel','Elbows track straight back'],
        mistakes:['Cross-body chicken-wing swing','Clenched fists','Shoulders rising as fatigue builds','Arms too tight (T-Rex)'],
        programming:{'Cue late race':'Elbows back HARD — legs follow'},
        tip:'Arms set cadence 1:1 with legs. When legs are toast in the final 5K, drive arms — legs MUST follow.' },
      { id:'form-foot', title:'Foot Strike Under Hip', best:'No Overstride',
        cue:'Land foot under your center of mass, not in front. Quiet, soft steps.',
        setup:['Posture set, slight forward lean','Cadence at target'],
        movement:['Foot moving backward (relative to body) at landing','Whisper-quiet contact','Quick exit — hot pavement cue'],
        mistakes:['Reaching forward with the foot','Heavy slap on landing','Heel-first strike with leg extended'],
        tip:'Don\'t obsess over heel vs midfoot vs forefoot — obsess over WHERE the foot lands.' },
      { id:'form-knee', title:'Knee Drive (Horizontal)', best:'Distance Knee Drive',
        cue:'Drive knee FORWARD, not up. ~30-45° hip flexion. Heel snaps toward butt.',
        setup:['Posture and cadence set'],
        movement:['Knee swings forward to ~90°','Lower leg unfolds naturally','Foot drops under hip'],
        mistakes:['Lifting knee too high (vertical waste)','No heel recovery (lazy lever)','Reaching with foot instead of driving knee'],
        tip:'For distance running, not sprint mechanics. Knee leads, foot follows.' },
      { id:'form-relax', title:'Relaxed Face & Shoulders', best:'Free Speed',
        cue:'Soft jaw, soft brow, hands loose. Costs nothing, saves energy.',
        setup:['Periodic body scan during runs'],
        movement:['Drop shoulders away from ears','Unclench jaw','Relax forehead'],
        mistakes:['Squinting (sunglasses fix this)','Gripping fists tight','Hunched shoulders'],
        tip:'Reset every 5 min. Tension radiates — face → shoulders → arms → stride.' }
    ]
  },

  {
    id:'easy-run', title:'Easy Run', tag:'Run • Aerobic Base',
    mega:'run', sub:'easy', keywords:'easy run zone 2 aerobic recovery conversational pace base mileage',
    quickCue:'Conversational. Slower than you think. Most amateurs run easy too fast.',
    general:{
      setup:['Heart rate Zone 2 (~65-75% max HR)','For 1:43 HM runner: ~9:00-9:45/mi','Can hold full conversation, complete sentences'],
      movement:['Smooth, relaxed form','Light cue (cadence or posture) only','Build aerobic engine, mitochondrial density'],
      mistakes:['Running easy days too fast (gray zone)','Adding intensity to "boring" runs','Skipping easy in favor of more workouts','Trying to maintain race-pace form at easy pace']
    },
    variations: [
      { id:'easy-recovery', title:'Recovery Run', best:'Day After Hard',
        cue:'Even slower than easy. Sole purpose: blood flow + recovery.',
        setup:['Day after long run or hard workout','30-45 min max','HR Zone 1-low Z2'],
        movement:['Truly easy — embarrassingly slow if needed','Form check, then autopilot','Skip if legs feel wrecked — rest is better'],
        mistakes:['Treating it as a workout','Adding pace pickups','Running with faster training partners'],
        programming:{'Duration':'30-45 min','Frequency':'1-2x/week','HR':'Zone 1'} },
      { id:'easy-aerobic', title:'Standard Easy Run', best:'Base Volume',
        cue:'Conversational pace, 45-75 min. The bread and butter of training.',
        setup:['Zone 2 HR','Nasal breathing test — should be possible'],
        movement:['Smooth, relaxed','Hold cadence (175+) with metronome if needed','One form cue per run'],
        mistakes:['Drifting into Zone 3 because it feels good'],
        programming:{'Duration':'45-75 min','Frequency':'2-4x/week','% of weekly volume':'~70%'} },
      { id:'easy-long', title:'Long Run', best:'Endurance Base',
        cue:'Distance accumulation, not pace. 90-150 min for HM training.',
        setup:['Fuel before (gel or food)','Carry water if 75+ min','Plan route — minimize stops'],
        movement:['Steady aerobic effort','Form holds longer than expected when paced right','Practice race-day fueling (gels every 30-45 min if 90+ min)'],
        mistakes:['Going too fast early','Skipping fueling','Same route every week (boredom)'],
        programming:{'Duration':'90-150 min (HM build)','Frequency':'Weekly','Distance':'~25-30% of weekly volume'} },
      { id:'easy-progression', title:'Progression Long Run', best:'Race Simulation',
        cue:'Start easy, finish at marathon pace or HM pace. Builds fatigue resistance.',
        setup:['90-120 min total','Easy → MP → HM segments'],
        movement:['First 60% easy','Next 25% at marathon pace','Final 15% at HM pace'],
        mistakes:['Starting too fast — defeats the progression'],
        programming:{'Sample':'90 min: 50 easy + 25 MP + 15 HM','Frequency':'Every 2-3 weeks'},
        tip:'Better than a flat long run for race-pace tolerance. Teaches form under fatigue.' }
    ]
  },

  {
    id:'tempo-run', title:'Tempo / Threshold Run', tag:'Run • Lactate Threshold',
    mega:'run', sub:'workout', keywords:'tempo threshold lactate sub-threshold workout HM pace',
    quickCue:'Comfortably hard. ~HM to 15K pace. Where HM time is built.',
    general:{
      setup:['Warmup 10-15 min easy','Pace = HM pace to 10-mile pace','HR Zone 4 (~85-90% max)'],
      movement:['Steady, sustained effort','Form holds together but you\'re working','Breathing rhythmic, controlled — 2:2 pattern'],
      mistakes:['Going too hard (becomes a race)','Going too easy (no threshold stimulus)','Skipping warmup','Doing tempo on tired legs day after hard workout']
    },
    variations: [
      { id:'tempo-continuous', title:'Continuous Tempo', best:'Threshold Block',
        cue:'20-40 min steady at tempo pace. Classic tempo run.',
        setup:['Warmup 10-15 min easy','Choose pace: HM pace + 5-10 sec/mi'],
        movement:['Lock in pace, hold steady','Form cue: tall and tipped','Cool down 10 min easy'],
        mistakes:['Pace creep — slowly speeding up'],
        programming:{'Duration':'20-40 min','Frequency':'1x/week','Pace':'HM + 5-10 sec/mi'} },
      { id:'tempo-cruise', title:'Cruise Intervals', best:'Tempo with Recovery',
        cue:'4-6 × 1 mile at HM pace, 1 min jog rest. Slightly harder than continuous.',
        setup:['Warmup 15 min','Choose pace = HM pace'],
        movement:['Hit splits within 2-3 sec consistency','Jog recoveries — keep moving','Cool down 10 min'],
        mistakes:['Negative-splitting the last rep too hard','Long recoveries (>2 min)'],
        programming:{'Reps':'4-6 × 1 mile','Rest':'60-90 sec jog','Pace':'HM pace'} },
      { id:'tempo-progression', title:'Tempo Progression', best:'Race Simulation',
        cue:'Start at marathon pace, end at HM pace. Final mile fastest.',
        setup:['Total volume 4-6 miles at tempo','Build pace each mile'],
        movement:['Mile 1: MP','Mile 2: between MP and HMP','Mile 3-4: HMP','Final mile: HMP or slightly faster'],
        mistakes:['Starting too fast — kills progression'],
        programming:{'Volume':'4-6 mi','Frequency':'Every 2-3 weeks'},
        tip:'Excellent for HM-specific fitness. Final mile teaches race-end push.' },
      { id:'tempo-mp-blocks', title:'Marathon Pace Long Run', best:'Long-Run Quality',
        cue:'Long run with 8-12 mi at marathon pace woven in.',
        setup:['Total 14-18 mi','MP segments mid-run'],
        movement:['Easy warmup 3-4 mi','MP block 8-12 mi','Easy cooldown 2-3 mi'],
        mistakes:['Doing MP too early when not warmed up'],
        programming:{'Distance':'14-18 mi','Frequency':'1-2x in build'} }
    ]
  },

  {
    id:'intervals', title:'Intervals (VO2max)', tag:'Run • Speed/Power',
    mega:'run', sub:'workout', keywords:'intervals vo2max 5k pace 10k pace track 800 1200 mile repeats',
    quickCue:'5K-mile pace efforts. Builds the ceiling. Done on track or measured loop.',
    general:{
      setup:['Long warmup 15-20 min (work in some strides)','Track or flat measured route','Pace = 5K to 10K pace, sometimes faster'],
      movement:['Hit splits with consistency','Form holds even when breathing heavy','Walk or jog recovery to drop HR'],
      mistakes:['Sprinting first reps, dying on last reps','Recovery too short to recover','Doing VO2 work when not aerobically built','Skipping warmup → injury risk']
    },
    variations: [
      { id:'int-400', title:'400m Repeats', best:'5K Speed',
        cue:'8-12 × 400m at 5K-mile pace, 200m jog recovery.',
        setup:['Track or measured 400m','Pace: ~1:42-1:48 per 400m for 1:43 HM runner'],
        movement:['Steady effort across reps — not faster each time','Form focused: quick cadence, drive arms','Jog 200m recovery'],
        mistakes:['First two reps too fast','Standing rest (allows HR to drop too far)'],
        programming:{'Reps':'8-12 × 400m','Rest':'200m jog','Pace':'5K-mile pace'} },
      { id:'int-800', title:'800m Repeats', best:'5K-10K Pace',
        cue:'6-8 × 800m at 5K-10K pace, 90 sec-2 min jog rest.',
        setup:['Pace: ~3:25-3:35 per 800m for your level','Track or measured loop'],
        movement:['Hold form through fatigue','Pace should feel hard but maintainable','Jog recovery'],
        mistakes:['Negative-splitting too hard'],
        programming:{'Reps':'6-8 × 800m','Rest':'90 sec-2 min jog','Pace':'5K-10K'} },
      { id:'int-1200', title:'1200m / Mile Repeats', best:'10K-HM Speed',

        movement:['Sustained threshold-plus effort','Eyes on form when it gets hard','Recovery jog at easy pace'],

        programming:{'Reps':'4-6 × 1200m or 3-5 × 1mi','Rest':'2-3 min jog','Pace':'10K pace'} },
      { id:'int-yasso', title:'Yasso 800s', best:'Marathon Predictor',

        movement:['Consistent pace across all 10','Recovery 400m jog'],

        programming:{'Reps':'10 × 800m','Rest':'400m jog'},
        tip:'Loosely predictive for marathon, decent fitness marker for HM training too.' }
    ]
  },

  {
    id:'hill-sprints', title:'Hill Sprints', tag:'Run • Power',
    mega:'run', sub:'workout', keywords:'hills hill sprints power strength incline short',
    quickCue:'8-12 sec all-out uphill, full recovery. Form forced by gravity.',
    general:{

        setup:['Back-to-back long days','Trail-specific training','Vest + fueling practice'],
        movement:['Long aerobic runs','Hike-run transitions','Real-food fueling practice'],
        warning:'Different sport. Don\'t treat like long road marathons.',
        programming:{'Race time':'4-30+ hr','Pace':'Z1-low Z2','Training':'24-36 wk build'} }
    ]
  },

  /* ==================== BIG ROCKS / PHILOSOPHY ==================== */
  {
    id:'big-rocks', title:'Endurance Big Rocks', tag:'Training • Priorities',
    mega:'training', sub:'priorities', keywords:'priorities big rocks ROI training time efficient improvement',
    quickCue:'Consistency > peak weeks. Sleep + protein + mileage. Form is leverage on fitness.',
    general:{
      setup:['Identify your limiter (aerobic, strength, mental, fueling)','Train weakest link, not favorite workout'],
      movement:['80/20: easy easy, hard hard','3-5 week build, 1 week deload','Show up consistently for months, not heroes weeks'],
      mistakes:['Optimizing the wrong thing','Streak mentality at expense of recovery','Comparing to others\' workouts','Trying to fix everything at once']
    },
    variations: [
      { id:'br-consistency', title:'Consistency > Heroes', best:'Long-Term Gains',
        cue:'Three months of 35 mpw beats one heroic 60 mpw week + injury.',
        setup:['Sustainable weekly volume','Show up when you don\'t want to'],
        movement:['Adaptation accumulates','Most underrated training quality is just showing up'],
        tip:'Boring is the secret sauce.' },
      { id:'br-recomp', title:'Body Recomp (185→165)', best:'Performance Lever',
        cue:'2 sec/mi per lb lost for runners. ~3-5% HM improvement potential.',
        setup:['Protein 1.6-2.2 g/kg','Slight deficit when not in peak training','Strength to keep muscle'],
        movement:['Daily protein','Sleep prioritized','Don\'t recomp in peak race build (compete first, recomp later)'],
        tip:'Biggest single performance lever for amateur athletes above 15% BF.' },
      { id:'br-aerobic-base', title:'Aerobic Base', best:'Foundation',
        cue:'Most amateurs need more EASY volume, not more intensity.',
        setup:['80% easy / 20% hard discipline'],
        movement:['Z2 builds the engine','Intensity polishes it','Without base, intensity hurts you'],
        tip:'Skipping base = burning out at peak. Patient base = bigger ceiling.' },
      { id:'br-skill', title:'Endurance is a Skill', best:'Mindset',
        cue:'Two athletes with same VO2max can finish 10+ min apart. Economy matters.',
        setup:['Train technique alongside fitness'],
        movement:['Form work, drills, swim technique','Bike fit + position','Pacing discipline'],
        tip:'Skill compounds over years. Most amateurs only train fitness.' },
      { id:'br-roi', title:'ROI Ranking', best:'Time-Limited Improvement',
        cue:'Sleep → fueling → consistency → volume → intensity → equipment.',
        setup:['Address in order'],
        movement:['Bad sleep wastes everything else','Underfueled training stalls','Inconsistent training never accumulates','Equipment is the LAST optimization, not the first'],
        tip:'$300 super-shoes after $0 on sleep and food = wrong order.' }
    ]
  }
];

/* ============================================================
   IMPORTANCE RATINGS (movement-level, 1-5 scale)
   5 = Essential, 4 = Important, 3 = Useful, 2 = Optional, 1 = Niche
   ============================================================ */
const importanceMap = {
  // Tier 5 - Essential
  'running-form': 5, 'easy-run': 5, 'tempo-run': 5, 'cycling-form': 5, 'bike-z2': 5,
  'swim-form': 5, 'rowing-form': 5, 'recovery': 5, 'zones': 5, 'fueling': 5,
  'race-day': 5, 'race-week': 5, 'big-rocks': 5,
  // Tier 4 - Important
  'intervals': 4, 'hill-sprints': 4, 'strides': 4, 'bike-sweetspot': 4, 'bike-ftp': 4,
  'swim-drills': 4, 'swim-sets': 4, 'open-water': 4, 'brick-workouts': 4, 'transitions': 4,
  'triathlon-overview': 4, 'periodization': 4, 'strength-endurance': 4, 'race-distances': 4,
  // Tier 3 - Useful
  'treadmill': 3, 'stationary-bike': 3, 'bike-vo2': 3, 'walking': 3, 'hiking': 3,
  'road-cycling': 3, 'stairmaster': 3, 'elliptical': 3,
  // Tier 2 - Optional
  'assault-bike': 2, 'skierg': 2, 'mountain-biking': 2, 'jump-rope': 2,
  'versaclimber': 2, 'arc-trainer': 2, 'curve-tm': 2,
  // Water sports
  'kayaking': 3, 'canoeing': 3, 'sup': 3, 'surfing': 3,
  'swimming-water': 4, 'rowing-water': 2, 'dragon-boat': 2,
  'rowing-flowing-water': 2, 'windsurfing': 2, 'kitesurfing': 2,
  'sailing': 2, 'open-water-distance': 3, 'pool-training': 4,
  // Winter sports
  'xc-ski-classic': 4, 'xc-ski-skate': 4, 'rollerski': 2,
  'downhill-ski': 3, 'backcountry-ski': 3, 'snowboard': 3,
  'ice-skating': 2, 'ice-skating-marathon': 1,
  'snowshoeing': 3, 'fat-biking': 2, 'winter-running': 4,
  'biathlon': 1, 'curling': 1, 'winter-base-training': 4
};

function getImportance(id) {
  return importanceMap[id] || 3;
}

function importanceBadge(id) {
  const score = getImportance(id);
  const stars = '★'.repeat(score) + '☆'.repeat(5 - score);
  return `<span class="importance t${score}"><span class="importance-stars">${stars}</span></span>`;
}

function megaBadge(mega) {
  const labels = { run:'Run', bike:'Bike', swim:'Swim', water:'Water', winter:'Winter', row:'Row', machine:'Machine', outdoor:'Outdoor', multi:'Multi', training:'Training', race:'Race' };
  return `<span class="mega-badge ${mega}">${labels[mega] || mega}</span>`;
}

let currentMega = 'all';
let currentSub = 'all';
let currentSearch = '';

const main = document.getElementById('exercises');
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
const megaFilter = document.getElementById('mega-filter');
const subFilter = document.getElementById('sub-filter');
const resultsCount = document.getElementById('results-count');

const subFilters = {
  all: [],
  run: [{id:'all',label:'All Run'},{id:'form',label:'Form'},{id:'easy',label:'Easy/Long'},{id:'workout',label:'Workouts'},{id:'machine',label:'Treadmill'}],
  bike: [{id:'all',label:'All Bike'},{id:'form',label:'Form'},{id:'easy',label:'Endurance'},{id:'workout',label:'Workouts'},{id:'machine',label:'Indoor'}],
  swim: [{id:'all',label:'All Swim'},{id:'form',label:'Form'},{id:'drills',label:'Drills'},{id:'workout',label:'Workouts'},{id:'outdoor',label:'Open Water'}],
  water: [{id:'all',label:'All Water'},{id:'paddle',label:'Paddling'},{id:'surf',label:'Surf/SUP'},{id:'sail',label:'Sail/Wind'},{id:'aqua',label:'Aqua/Pool'}],
  winter: [{id:'all',label:'All Winter'},{id:'xc',label:'XC Ski'},{id:'downhill',label:'Downhill/AT'},{id:'skate',label:'Skating'},{id:'snow',label:'Snow Other'}],
  row: [{id:'all',label:'All Row'},{id:'form',label:'Form'}],
  machine: [{id:'all',label:'All Machines'},{id:'treadmill',label:'Treadmill'},{id:'elliptical',label:'Elliptical'},{id:'climber',label:'Climbers'},{id:'skierg',label:'SkiErg'}],
  outdoor: [{id:'all',label:'All Outdoor'},{id:'walk',label:'Walking'},{id:'trail',label:'Trails'},{id:'mtb',label:'MTB'},{id:'road',label:'Road Bike'},{id:'agility',label:'Agility'}],
  multi: [{id:'all',label:'All Multi'},{id:'tri',label:'Triathlon'},{id:'brick',label:'Bricks'},{id:'transition',label:'Transitions'}],
  training: [{id:'all',label:'All Training'},{id:'zones',label:'Zones'},{id:'planning',label:'Periodization'},{id:'nutrition',label:'Fueling'},{id:'strength',label:'Strength'},{id:'recovery',label:'Recovery'},{id:'priorities',label:'Priorities'}],
  race: [{id:'all',label:'All Race'},{id:'execution',label:'Race Day'},{id:'taper',label:'Taper'},{id:'reference',label:'Distances'}]
};

function renderSubFilters() {
  const filters = subFilters[currentMega] || [];
  if (filters.length === 0) { subFilter.innerHTML = ''; return; }
  subFilter.innerHTML = filters.map(f =>
    `<div class="sub-pill ${f.id === currentSub ? 'active' : ''}" data-filter="${f.id}">${f.label}</div>`
  ).join('');
  subFilter.querySelectorAll('.sub-pill').forEach(p => {
    p.addEventListener('click', () => {
      currentSub = p.dataset.filter;
      renderSubFilters();
      render();
    });
  });
}

function exerciseMatchesSearch(ex, q) {
  if (!q) return true;
  if (ex.title.toLowerCase().includes(q)) return true;
  if (ex.keywords && ex.keywords.toLowerCase().includes(q)) return true;
  if (ex.tag.toLowerCase().includes(q)) return true;
  if (ex.quickCue && ex.quickCue.toLowerCase().includes(q)) return true;
  if (ex.variations) {
    for (const v of ex.variations) {
      if (v.title.toLowerCase().includes(q)) return true;
      if (v.cue && v.cue.toLowerCase().includes(q)) return true;
      if (v.best && v.best.toLowerCase().includes(q)) return true;
    }
  }
  return false;
}

function render() {
  const filtered = exercises.filter(ex => {
    const matchesMega = currentMega === 'all' || ex.mega === currentMega;
    const matchesSub = currentSub === 'all' || ex.sub === currentSub;
    const matchesSearch = exerciseMatchesSearch(ex, currentSearch);
    return matchesMega && matchesSub && matchesSearch;
  });
  const totalVariations = filtered.reduce((sum, ex) => sum + (ex.variations ? ex.variations.length : 0), 0);
  resultsCount.textContent = `${filtered.length} topic${filtered.length === 1 ? '' : 's'} · ${totalVariations} variation${totalVariations === 1 ? '' : 's'}`;
  if (filtered.length === 0) { main.innerHTML = '<div class="no-results">No matches. Try a different search or clear filters.</div>'; return; }

  main.innerHTML = filtered.map(ex => `
    <div class="exercise" data-id="${ex.id}" data-mega="${ex.mega}">
      <div class="exercise-header" onclick="toggleEx('${ex.id}')">
        <div class="ex-icon">${megaIcon(ex.mega)}</div>
        <div class="ex-info">
          <div class="ex-title">${ex.title}</div>
          <div class="ex-tag">${ex.tag}</div>
        </div>
        ${importanceBadge(ex.id)}
        ${megaBadge(ex.mega)}
        <div class="chevron">▶</div>
      </div>
      <div class="exercise-body">
        ${ex.quickCue ? `<div class="quick-cue">💡 ${ex.quickCue}</div>` : ''}
        ${ex.general ? `
          <div class="section"><div class="section-title">Setup</div><div class="section-content"><ul>${ex.general.setup.map(s => `<li>${s}</li>`).join('')}</ul></div></div>
          <div class="section"><div class="section-title">Movement</div><div class="section-content"><ul>${ex.general.movement.map(s => `<li>${s}</li>`).join('')}</ul></div></div>
          <div class="section"><div class="section-title warn">Mistakes</div><div class="section-content"><ul>${ex.general.mistakes.map(s => `<li>${s}</li>`).join('')}</ul></div></div>
        ` : ''}
        ${ex.variations ? `
          <div class="section">
            <div class="section-title var">Variations (${ex.variations.length}) — Tap to expand</div>
            <div class="variations-wrap">
              ${ex.variations.map(v => `
                <div class="variation" data-vid="${ex.id}-${v.id}">
                  <div class="variation-header" onclick="toggleVar(event, '${ex.id}-${v.id}')">
                    <div class="var-title">${v.title}</div>
                    ${v.best ? `<div class="var-best">${v.best}</div>` : ''}
                    <div class="var-chev">▶</div>
                  </div>
                  <div class="variation-body">
                    ${v.cue ? `<div class="var-cue">${v.cue}</div>` : ''}
                    ${v.setup ? `<div class="var-section"><div class="var-section-title">Setup</div><div class="var-section-content"><ul>${v.setup.map(s => `<li>${s}</li>`).join('')}</ul></div></div>` : ''}
                    ${v.movement ? `<div class="var-section"><div class="var-section-title">Movement</div><div class="var-section-content"><ul>${v.movement.map(s => `<li>${s}</li>`).join('')}</ul></div></div>` : ''}
                    ${v.mistakes ? `<div class="var-section"><div class="var-section-title warn">Mistakes</div><div class="var-section-content"><ul>${v.mistakes.map(s => `<li>${s}</li>`).join('')}</ul></div></div>` : ''}
                    ${v.programming ? `<div class="var-section"><div class="var-section-title">Programming</div><div class="var-section-content"><div class="programming-grid">${Object.entries(v.programming).map(([k,val]) => `<div>${k}</div><div>${val}</div>`).join('')}</div></div></div>` : ''}
                    ${v.tip ? `<div class="var-section"><div class="var-section-title tip">Tip</div><div class="var-section-content">${v.tip}</div></div>` : ''}
                    ${v.warning ? `<div class="var-section"><div class="var-section-title" style="color:#e25555">⚠️ Warning</div><div class="var-section-content">${v.warning}</div></div>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');
}

function megaIcon(mega) {
  const icons = {
    run: '🏃', bike: '🚴', swim: '🏊', water: '🌊', winter: '❄️', row: '🚣', machine: '⚙️', outdoor: '🏔', multi: '🏆', training: '📊', race: '🏁'
  };
  return `<span style="font-size:22px">${icons[mega] || '•'}</span>`;
}

function toggleEx(id) {
  document.querySelector(`.exercise[data-id="${id}"]`).classList.toggle('open');
}

function toggleVar(event, vid) {
  event.stopPropagation();
  document.querySelector(`.variation[data-vid="${vid}"]`).classList.toggle('open');
}

searchEl.addEventListener('input', e => { currentSearch = e.target.value.trim().toLowerCase(); render(); });
clearBtn.addEventListener('click', () => { searchEl.value = ''; currentSearch = ''; render(); searchEl.focus(); });
megaFilter.querySelectorAll('.mega-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    megaFilter.querySelectorAll('.mega-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentMega = pill.dataset.mega;
    currentSub = 'all';
    renderSubFilters();
    render();
  });
});

renderSubFilters();
render();

// Timestamp
(function() {
  const now = new Date();
  const opts = { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
  document.getElementById('ts').textContent = '· ' + now.toLocaleString(undefined, opts);
})();
</script>
